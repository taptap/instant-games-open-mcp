name: Publish Maker Package

on:
  workflow_dispatch:
    inputs:
      version_mode:
        description: 'Version mode: latest auto increments stable patch; beta/alpha/next auto publish prerelease'
        required: true
        default: auto-last-number
        type: choice
        options:
          - auto-last-number
          - manual
      version:
        description: 'Manual @taptap/maker version, for example 0.0.1-beta.1 or 0.0.1'
        required: false
        type: string
      tag:
        description: 'npm dist-tag'
        required: false
        default: beta
        type: choice
        options:
          - beta
          - latest
          - next
          - alpha

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  resolve-version:
    name: Resolve @taptap/maker version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      current_version: ${{ steps.version.outputs.current_version }}
      major_minor_changed: ${{ steps.version.outputs.major_minor_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve publish version
        id: version
        run: node scripts/resolve-maker-version.js
        env:
          MAKER_VERSION_MODE: ${{ inputs.version_mode }}
          MAKER_MANUAL_VERSION: ${{ inputs.version }}
          MAKER_NPM_TAG: ${{ inputs.tag }}

      - name: Approval summary
        run: |
          echo "## @taptap/maker publish preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- dist-tag: \`${{ inputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- current online version: \`${{ steps.version.outputs.current_version || 'none' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- target version: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- major/minor changed: \`${{ steps.version.outputs.major_minor_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version.outputs.major_minor_changed }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Major/minor changed. Review the current online version and target version above, then approve the protected publish job to continue." >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Publish @taptap/maker
    runs-on: ubuntu-latest
    needs: resolve-version
    environment: npm_publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Maker bundle
        run: npm run build -- --skip-server --skip-proxy --skip-native
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Prepare standalone package
        run: node scripts/prepare-maker-package.js --version "$MAKER_PACKAGE_VERSION"
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Dry-run package contents
        run: cd packages/maker && npm pack --dry-run

      - name: Pack package
        run: cd packages/maker && npm pack

      - name: Verify packed CLI
        run: npx -y -p "./packages/maker/taptap-maker-${MAKER_PACKAGE_VERSION}.tgz" taptap-maker help
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Verify version is still unpublished before npm publish
        run: |
          set -euo pipefail
          if npm view "@taptap/maker@${MAKER_PACKAGE_VERSION}" version >/tmp/maker-version-check.txt 2>/dev/null; then
            echo "::error::@taptap/maker@${MAKER_PACKAGE_VERSION} already exists on npm."
            cat /tmp/maker-version-check.txt
            exit 1
          fi
          echo "@taptap/maker@${MAKER_PACKAGE_VERSION} is still unpublished."
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}

      - name: Publish package
        run: |
          set -euo pipefail
          tarball="./packages/maker/taptap-maker-${MAKER_PACKAGE_VERSION}.tgz"
          npm publish "$tarball" --access public --tag "$NPM_TAG" --provenance
          echo "Published @taptap/maker@$MAKER_PACKAGE_VERSION"
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}
          NPM_TAG: ${{ inputs.tag }}

      - name: Update Maker version policy
        id: version-policy
        run: |
          node scripts/update-maker-version-policy.cjs \
            --tag "$NPM_TAG" \
            --version "$MAKER_PACKAGE_VERSION"
        env:
          MAKER_PACKAGE_VERSION: ${{ needs.resolve-version.outputs.version }}
          NPM_TAG: ${{ inputs.tag }}

      - name: Generate version policy PR token
        id: version-policy-token
        if: steps.version-policy.outputs.changed == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Create Maker version policy PR
        if: steps.version-policy.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.version-policy-token.outputs.token }}
          branch: chore/update-maker-version-policy-${{ needs.resolve-version.outputs.version }}
          delete-branch: true
          title: 'chore(maker): update maker version policy for ${{ needs.resolve-version.outputs.version }}'
          commit-message: |
            chore(maker): update maker version policy

            - Update config/maker-version-policy.json after @taptap/maker publish
            - Preserve minimum_supported, blacklist, and message policy fields
            - Verification: publish-maker workflow completed npm publish first
          body: |
            Updates `config/maker-version-policy.json` after publishing
            `@taptap/maker@${{ needs.resolve-version.outputs.version }}` with npm tag
            `${{ inputs.tag }}`.

            The workflow only updates `latest` or `latest_beta` plus `updated_at`.
            Manual policy fields such as `minimum_supported`, `blacklist`, and `message`
            are preserved for review-driven changes.

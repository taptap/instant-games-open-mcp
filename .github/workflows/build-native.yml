name: Build Native Signer

# 这个 workflow 作为 reusable workflow 被 release.yml 调用
# 也可以手动触发用于测试

on:
  workflow_call:
    secrets:
      BUILD_CLIENT_ID:
        required: true
      BUILD_CLIENT_SECRET:
        required: true
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean

# 最小权限原则：此 workflow 只需要读取代码和上传 artifacts
permissions:
  contents: read

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS Intel (x64)
          # 注意：macos-13 预装了 Rust，但 napi-rs 使用 /bin/sh 调用 cargo
          # 使用 CARGO 环境变量直接指定 cargo 路径，绕过 PATH 查找问题
          - host: macos-13
            target: x86_64-apple-darwin
            artifact: taptap-signer.darwin-x64.node
            build: |
              # 调试信息
              echo "CARGO_HOME=$CARGO_HOME"
              ls -la "$CARGO_HOME/bin/" || echo "cargo bin dir not found"
              # 设置 CARGO 环境变量让 napi-rs 直接使用
              export CARGO="$CARGO_HOME/bin/cargo"
              export PATH="$CARGO_HOME/bin:$PATH"
              echo "CARGO=$CARGO"
              echo "PATH=$PATH"
              "$CARGO" --version || echo "cargo not found via CARGO env"
              cd native
              npm run build
              strip -x *.node

          # macOS Apple Silicon (ARM64)
          - host: macos-latest
            target: aarch64-apple-darwin
            artifact: taptap-signer.darwin-arm64.node
            build: |
              # 设置 CARGO 环境变量让 napi-rs 直接使用
              export CARGO="$CARGO_HOME/bin/cargo"
              export PATH="$CARGO_HOME/bin:$PATH"
              cd native
              npm run build -- --target aarch64-apple-darwin
              strip -x *.node

          # Linux GNU
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: taptap-signer.linux-x64-gnu.node
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              rustup update stable && rustup default stable
              cd native
              npm run build -- --target x86_64-unknown-linux-gnu
              strip *.node

          # Linux Musl x64 (Alpine)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: taptap-signer.linux-x64-musl.node
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              rustup update stable && rustup default stable
              cd native
              npm run build -- --target x86_64-unknown-linux-musl
              strip *.node

          # Linux Musl ARM64 (Alpine on ARM servers / Apple Silicon Docker)
          # 使用 zig 作为交叉编译器
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: taptap-signer.linux-arm64-musl.node
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              # 安装 zig 用于交叉编译
              apk add --no-cache zig
              # 更新 Rust 并添加 ARM64 target
              rustup update stable && rustup default stable
              rustup target add aarch64-unknown-linux-musl
              cd native
              # 使用 zig 作为链接器进行交叉编译
              npm run build -- --target aarch64-unknown-linux-musl --zig
              # ARM64 需要使用 llvm-strip 或跳过 strip
              llvm-strip *.node 2>/dev/null || aarch64-linux-gnu-strip *.node 2>/dev/null || echo "Skip strip for cross-compiled binary"

          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: taptap-signer.win32-x64-msvc.node
            build: |
              cd native
              npm run build

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # 修复：dtolnay/rust-toolchain 在 rustup 已存在时不会添加 PATH
      # macos-13 预装了 Rust，但 PATH 可能没有正确设置
      - name: Ensure Cargo in PATH
        if: ${{ !matrix.settings.docker }}
        shell: bash
        run: |
          echo "$CARGO_HOME/bin" >> $GITHUB_PATH
          echo "Added $CARGO_HOME/bin to PATH"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-${{ matrix.settings.target }}-${{ hashFiles('native/Cargo.lock') }}

      - name: Install native dependencies
        run: |
          cd native
          npm install

      - name: Build in Docker
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: |
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build
            -e BUILD_CLIENT_ID=${{ secrets.BUILD_CLIENT_ID }}
            -e BUILD_CLIENT_SECRET=${{ secrets.BUILD_CLIENT_SECRET }}
          run: ${{ matrix.settings.build }}

      - name: Build
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          BUILD_CLIENT_ID: ${{ secrets.BUILD_CLIENT_ID }}
          BUILD_CLIENT_SECRET: ${{ secrets.BUILD_CLIENT_SECRET }}
        run: ${{ matrix.settings.build }}

      - name: List built files
        shell: bash
        run: |
          ls -la native/*.node || echo "No .node files found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: native/*.node
          if-no-files-found: error

  # 合并所有平台的 artifact
  package:
    name: Package All Binaries
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move and rename artifacts
        run: |
          mkdir -p native-binaries

          # 移动所有 .node 文件到统一目录
          find artifacts -name "*.node" -exec cp {} native-binaries/ \;

          echo "=== Built binaries ==="
          ls -la native-binaries/

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: native-signer-binaries
          path: native-binaries/*.node
          if-no-files-found: error
          retention-days: 7

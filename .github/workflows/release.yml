name: Manual Main Package Release

# 主包 npm 发布必须手动触发，不能由 main/beta/alpha push 或 PR merge 自动触发。
# Native signer 按需编译：只有 native/ 目录有变更时才重新构建

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional target version. Leave empty to auto increment only z from npm latest.'
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  scope:
    name: Release Scope
    runs-on: ubuntu-latest
    outputs:
      skip_legacy_release: ${{ steps.scope.outputs.skip_legacy_release }}
      only_maker_changed: ${{ steps.scope.outputs.only_maker_changed }}
      has_maker_marker: ${{ steps.scope.outputs.has_maker_marker }}
      non_maker_files: ${{ steps.scope.outputs.non_maker_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate release scope
        id: scope
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_legacy_release=false" >> "$GITHUB_OUTPUT"
            echo "only_maker_changed=false" >> "$GITHUB_OUTPUT"
            echo "has_maker_marker=false" >> "$GITHUB_OUTPUT"
            echo "non_maker_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node scripts/check-release-scope.cjs \
            --mode push \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --title "$HEAD_COMMIT_MESSAGE"

  maker-only-release-skipped:
    name: Legacy Release Skipped For Maker
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.skip_legacy_release == 'true'

    steps:
      - name: Summary
        run: |
          echo "## Legacy Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This push only changed Maker-owned paths." >> "$GITHUB_STEP_SUMMARY"
          echo "The main package \`@taptap/instant-games-open-mcp\` was not released." >> "$GITHUB_STEP_SUMMARY"
          echo "Use the \`Publish Maker Package\` workflow to publish \`@taptap/maker\`." >> "$GITHUB_STEP_SUMMARY"

  unsupported-branch:
    name: Unsupported Release Branch
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.ref_name != 'main'

    steps:
      - name: Summary
        run: |
          echo "## Unsupported release branch" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The main package latest release workflow can only run from \`main\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Current branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          exit 1

  # ========== 阶段 1: 解析版本 + 检测 native 变更 ==========
  analyze:
    name: Resolve Release
    runs-on: ubuntu-latest
    needs: scope
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.ref_name == 'main'
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      current_version: ${{ steps.version.outputs.current_version }}
      major_minor_changed: ${{ steps.version.outputs.major_minor_changed }}
      version_mode: ${{ steps.version.outputs.mode }}
      native_changed: ${{ steps.native_check.outputs.changed }}
      has_native_assets: ${{ steps.release_check.outputs.has_assets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve main package version
        id: version
        run: node scripts/resolve-main-release-version.js
        env:
          MAIN_MANUAL_VERSION: ${{ inputs.version }}

      - name: Approval summary
        run: |
          echo "## Main package publish preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- package: \`@taptap/instant-games-open-mcp\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- dist-tag: \`latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- mode: \`${{ steps.version.outputs.mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- current online version: \`${{ steps.version.outputs.current_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- target version: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- major/minor changed: \`${{ steps.version.outputs.major_minor_changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.version.outputs.major_minor_changed }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Major/minor changed. Review the current online version and target version above, then approve the protected publish job to continue." >> "$GITHUB_STEP_SUMMARY"
          fi

      # 检测 native/ 目录是否有变更
      - name: Check native changes
        id: native_check
        run: |
          # 获取上次发布的 tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "Last tag: $LAST_TAG"

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, need to build native"
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检查 native/ 目录是否有变更（包括 Cargo.toml, Cargo.lock, src/, build.rs）
          CHANGED_FILES=$(git diff --name-only "$LAST_TAG" HEAD -- \
            native/Cargo.toml \
            native/Cargo.lock \
            native/src/ \
            native/build.rs \
            native/package.json \
          )

          if [ -n "$CHANGED_FILES" ]; then
            echo "Native files changed:"
            echo "$CHANGED_FILES"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No native files changed since $LAST_TAG"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 检查是否有可用的 Release assets
      - name: Check existing release assets
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 如果 native 代码有变更，直接返回（不需要检查 assets）
          if [ "${{ steps.native_check.outputs.changed }}" == "true" ]; then
            echo "Native code changed, will rebuild"
            echo "has_assets=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 获取最新 Release
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [ -z "$LATEST_RELEASE" ]; then
            echo "No existing release found, need to build native"
            echo "has_assets=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检查是否有 native binaries
          ASSETS=$(gh release view "$LATEST_RELEASE" --json assets --jq '.assets[].name' 2>/dev/null | grep "\.node$" || echo "")

          if [ -z "$ASSETS" ]; then
            echo "No native binaries in release $LATEST_RELEASE, need to build"
            echo "has_assets=false" >> $GITHUB_OUTPUT
          else
            echo "Found native binaries in $LATEST_RELEASE:"
            echo "$ASSETS"
            echo "has_assets=true" >> $GITHUB_OUTPUT
          fi

  # ========== 阶段 2a: 构建 Native Signer (有变更 或 没有可用 assets) ==========
  build-native:
    name: Build Native - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs: analyze
    # 构建条件：需要发布 且 (native 有变更 或 没有可用的 assets)
    if: |
      needs.analyze.outputs.should_release == 'true' &&
      (needs.analyze.outputs.native_changed == 'true' || needs.analyze.outputs.has_native_assets == 'false')

    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS Intel (x64)
          # 注意：macos-14 预装的 Rust 配置已损坏（符号链接指向 ARM64 路径）
          # 需要清理损坏的配置并重新安装 Rust
          - host: macos-14
            target: x86_64-apple-darwin
            build: |
              # 检查 cargo 是否真正可用（不只是符号链接存在）
              if ! cargo --version &> /dev/null; then
                echo "cargo not working, cleaning up and reinstalling Rust..."
                # 删除损坏的 cargo bin 目录（保留缓存）
                rm -rf "$HOME/.cargo/bin"
                # 删除损坏的 rustup 设置
                rm -f "$HOME/.rustup/settings.toml"
                # 重新安装 Rust
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target x86_64-apple-darwin
                source "$HOME/.cargo/env"
              fi
              # 确保 PATH 正确
              export PATH="$HOME/.cargo/bin:$PATH"
              echo "cargo version: $(cargo --version)"
              cd native
              npm run build
              strip -x *.node

          # macOS Apple Silicon (ARM64)
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              export PATH="$CARGO_HOME/bin:$PATH"
              cd native
              npm run build -- --target aarch64-apple-darwin
              strip -x *.node

          # Linux GNU
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              rustup update stable && rustup default stable
              cd native
              npm run build -- --target x86_64-unknown-linux-gnu
              strip *.node

          # Linux Musl x64 (Alpine)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              rustup update stable && rustup default stable
              cd native
              npm run build -- --target x86_64-unknown-linux-musl
              strip *.node

          # Linux Musl ARM64 (Alpine on ARM servers / Apple Silicon Docker)
          # 使用 zig 作为交叉编译器
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              # 安装 zig 用于交叉编译
              apk add --no-cache zig
              # 更新 Rust 并添加 ARM64 target
              rustup update stable && rustup default stable
              rustup target add aarch64-unknown-linux-musl
              cd native
              # 使用 zig 作为链接器进行交叉编译
              npm run build -- --target aarch64-unknown-linux-musl --zig
              # ARM64 需要使用 llvm-strip 或跳过 strip
              llvm-strip *.node 2>/dev/null || aarch64-linux-gnu-strip *.node 2>/dev/null || echo "Skip strip for cross-compiled binary"

          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              cd native
              npm run build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # 修复：dtolnay/rust-toolchain 在 rustup 已存在时不会添加 PATH
      # macos-14 预装了 Rust，但 PATH 可能没有正确设置
      - name: Ensure Cargo in PATH
        if: ${{ !matrix.settings.docker }}
        shell: bash
        run: |
          echo "$CARGO_HOME/bin" >> $GITHUB_PATH
          echo "Added $CARGO_HOME/bin to PATH"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-${{ matrix.settings.target }}-${{ hashFiles('native/Cargo.lock') }}

      - name: Install native dependencies
        run: |
          cd native
          npm install

      - name: Build in Docker
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: |
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build
            -e BUILD_CLIENT_ID=${{ secrets.BUILD_CLIENT_ID }}
            -e BUILD_CLIENT_SECRET=${{ secrets.BUILD_CLIENT_SECRET }}
          run: ${{ matrix.settings.build }}

      - name: Build
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          BUILD_CLIENT_ID: ${{ secrets.BUILD_CLIENT_ID }}
          BUILD_CLIENT_SECRET: ${{ secrets.BUILD_CLIENT_SECRET }}
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: native/*.node
          if-no-files-found: error

  # ========== 阶段 2b: 从最新 Release 下载 Native Binaries (无变更 且 有可用 assets) ==========
  download-native:
    name: Download Native from Release
    runs-on: ubuntu-latest
    needs: analyze
    # 下载条件：需要发布 且 native 无变更 且 有可用的 assets
    if: |
      needs.analyze.outputs.should_release == 'true' &&
      needs.analyze.outputs.native_changed == 'false' &&
      needs.analyze.outputs.has_native_assets == 'true'

    steps:
      - name: Download native binaries from latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p native

          # 获取最新 Release
          LATEST_RELEASE=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          echo "Downloading native binaries from release: $LATEST_RELEASE"

          # 下载所有 .node 文件
          gh release download "$LATEST_RELEASE" \
            --repo ${{ github.repository }} \
            --pattern "*.node" \
            --dir native/

          echo "=== Downloaded native binaries ==="
          ls -la native/

      - name: Upload artifact (for release job)
        uses: actions/upload-artifact@v4
        with:
          name: native-from-release
          path: native/*.node
          if-no-files-found: error

  # ========== 阶段 3: 发布 ==========
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm_publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    needs: [analyze, build-native, download-native]
    # 只要 analyze 说要发布，且 build-native 或 download-native 其中一个成功
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      github.ref_name == 'main' &&
      needs.analyze.outputs.should_release == 'true' &&
      (needs.build-native.result == 'success' || needs.download-native.result == 'success')

    steps:
      - name: Generate release app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # 下载 native 构建产物（来自 build-native 或 download-native）
      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move native binaries to native/
        run: |
          mkdir -p native

          # 移动所有 .node 文件
          find artifacts -name "*.node" -exec cp {} native/ \;

          echo "=== Native binaries ==="
          ls -la native/*.node

      # 质量检查
      - name: Lint code
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Resolve release package version
        id: release_version
        run: |
          VERSION="${{ needs.analyze.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using manually resolved version: ${VERSION}"

      - name: Generate release write app token
        id: write-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Configure release write app token
        env:
          GH_TOKEN: ${{ steps.write-app-token.outputs.token }}
        run: |
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: bearer ${GH_TOKEN}"

      - name: Resolve existing release PR
        id: release_pr
        env:
          GH_TOKEN: ${{ steps.write-app-token.outputs.token }}
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          BRANCH="release/v${VERSION}"

          PR_FIELDS=$(gh pr list \
            --state all \
            --base main \
            --head "$BRANCH" \
            --json url,number,state \
            --jq '[(.[0].url // ""), (.[0].number // ""), (.[0].state // "")] | @tsv')
          IFS=$'\t' read -r PR_URL PR_NUMBER PR_STATE <<< "$PR_FIELDS"

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "state=${PR_STATE}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          if [ -n "$PR_URL" ]; then
            echo "Found existing release PR: ${PR_URL} (state=${PR_STATE})"
          else
            echo "No existing release PR found for ${BRANCH}"
          fi

      - name: Fail closed release PR
        if: steps.release_pr.outputs.state == 'CLOSED'
        run: |
          echo "Existing release PR was closed without merging"
          echo "${{ steps.release_pr.outputs.url }}"
          exit 1

      # 创建 Release 分支
      - name: Create release branch
        if: success() && steps.release_pr.outputs.state != 'MERGED'
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Release branch ${BRANCH} already exists, reusing it"
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

      - name: Checkout merged release commit
        if: success() && steps.release_pr.outputs.state == 'MERGED'
        env:
          GH_TOKEN: ${{ steps.write-app-token.outputs.token }}
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          PR_NUMBER=${{ steps.release_pr.outputs.number }}

          MERGE_COMMIT=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid // ""')
          if [ -z "$MERGE_COMMIT" ]; then
            echo "Release PR #${PR_NUMBER} is merged but merge commit is unavailable"
            exit 1
          fi

          git fetch origin main
          git checkout -B main "$MERGE_COMMIT"

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "Merged main package version ${PACKAGE_VERSION} does not match ${VERSION}"
            exit 1
          fi

      - name: Set release package version
        if: success() && steps.release_pr.outputs.state != 'MERGED'
        run: |
          VERSION=${{ steps.release_version.outputs.version }}

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" = "$VERSION" ]; then
            echo "Release branch package.json already has version ${VERSION}"
            exit 0
          fi

          npm version $VERSION --no-git-tag-version

      # 生成主包 CHANGELOG 和 GitHub Release notes，过滤 Maker-only commits
      - name: Generate filtered main package release notes
        run: |
          node scripts/generate-main-release-notes.cjs
          test -s release-notes.md
          cp release-notes.md "$RUNNER_TEMP/main-release-notes.md"
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}

      - name: Verify package contents before publish
        run: |
          test -s "$RUNNER_TEMP/main-release-notes.md"
          echo "=== Files to be published ==="
          npm pack --dry-run

      # 发布到 npm (包含 native binaries)
      # 优先使用 OIDC provenance；fallback 到 NPM_TOKEN（首次发布新包名时需要）
      - name: Verify or publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ steps.release_version.outputs.version }}

          if npm view "@taptap/instant-games-open-mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "@taptap/instant-games-open-mcp@${VERSION} already exists on npm"
            npm dist-tag add "@taptap/instant-games-open-mcp@${VERSION}" latest
            exit 0
          fi

          npm publish --access public --tag latest --provenance 2>/dev/null \
            || npm publish --access public --tag latest

      # 提交并推送
      - name: Commit and push release branch
        if: success() && steps.release_pr.outputs.state != 'MERGED'
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          BRANCH=${{ steps.release_pr.outputs.branch }}
          NATIVE_CHANGED=${{ needs.analyze.outputs.native_changed }}

          NATIVE_NOTE=""
          if [ "$NATIVE_CHANGED" == "true" ]; then
            NATIVE_NOTE="- Native signer: rebuilt (files changed)"
          else
            NATIVE_NOTE="- Native signer: reused from previous release"
          fi

          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Release files already committed on ${BRANCH}"
            exit 0
          fi

          git commit -m "chore(release): ${VERSION}

          ${NATIVE_NOTE}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "$BRANCH"

      # 创建 PR
      - name: Create Pull Request
        id: pr
        if: success() && steps.release_pr.outputs.url == ''
        env:
          GH_TOKEN: ${{ steps.write-app-token.outputs.token }}
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          BRANCH=${{ steps.release_pr.outputs.branch }}
          NATIVE_CHANGED=${{ needs.analyze.outputs.native_changed }}

          if [ "$NATIVE_CHANGED" == "true" ]; then
            NATIVE_STATUS="🔨 重新构建 (native/ 有变更)"
          else
            NATIVE_STATUS="♻️ 复用上次构建 (native/ 无变更)"
          fi

          PR_URL=$(gh pr create \
            --title "chore(release): ${VERSION}" \
            --body "## 📦 Release ${VERSION}

          此 PR 由手动主包发布流程创建。

          ### 变更内容
          - ✅ 版本号: ${VERSION}
          - ✅ 已发布到 npm
          - 📝 更新 \`package.json\`
          - 📝 更新 \`CHANGELOG.md\`

          ### Native Signer
          ${NATIVE_STATUS}

          ### 平台支持
          - ✅ macOS (Intel + Apple Silicon)
          - ✅ Linux (x64 glibc + musl + ARM64)
          - ✅ Windows (x64)

          ### 自动化流程
          此 PR 将在创建后立即自动合并。

          🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Created PR: $PR_URL"

      # 自动合并
      - name: Auto-merge PR
        if: success() && steps.release_pr.outputs.state != 'MERGED'
        env:
          GH_TOKEN: ${{ steps.write-app-token.outputs.token }}
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url || steps.release_pr.outputs.url }}"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          AUTO_MERGE_ENABLED=$(gh pr view "$PR_NUMBER" \
            --json autoMergeRequest \
            --jq '.autoMergeRequest != null')
          if [ "$AUTO_MERGE_ENABLED" = "true" ]; then
            echo "Auto-merge is already enabled for PR #$PR_NUMBER"
            exit 0
          fi

          echo "Enabling auto-merge for PR #$PR_NUMBER..."

          gh pr merge "$PR_NUMBER" \
            --auto \
            --squash \
            --delete-branch

          echo "Auto-merge enabled for PR #$PR_NUMBER, will merge when all checks pass."

      # 等待 release PR 合并；等待期间不消耗后续写操作使用的 App token。
      - name: Wait for release PR merge
        id: wait_for_merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url || steps.release_pr.outputs.url }}"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          STATE="${{ steps.release_pr.outputs.state }}"

          # 等待 PR 合并（auto-merge 是异步的）
          if [ "$STATE" != "MERGED" ]; then
            echo "Waiting for PR #$PR_NUMBER to be merged..."
            for i in $(seq 1 360); do
              STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
              if [ "$STATE" = "MERGED" ]; then
                echo "PR #$PR_NUMBER merged after ${i}0s"
                break
              fi
              if [ "$STATE" = "CLOSED" ]; then
                echo "PR #$PR_NUMBER was closed without merging"
                exit 1
              fi
              sleep 10
            done
          fi

          if [ "$STATE" != "MERGED" ]; then
            echo "Timeout waiting for PR merge."
            echo "After the release PR is merged, rerun failed jobs to continue."
            exit 1
          fi

          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          MERGE_COMMIT=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid // ""')
          if [ -z "$MERGE_COMMIT" ]; then
            echo "Release PR #${PR_NUMBER} is merged but merge commit is unavailable"
            exit 1
          fi
          echo "merge_commit=${MERGE_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Generate final release app token
        id: final-app-token
        if: success() && steps.wait_for_merge.outputs.state == 'MERGED'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # release PR 合并后，用新生成的 App token 创建 tag 和 GitHub Release。
      - name: Create GitHub Release
        if: success() && steps.wait_for_merge.outputs.state == 'MERGED'
        env:
          GH_TOKEN: ${{ steps.final-app-token.outputs.token }}
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          MERGE_COMMIT=${{ steps.wait_for_merge.outputs.merge_commit }}

          # PR 已合并，检出该 release PR 的 merge commit，避免 main 后续推进影响 tag 目标。
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: bearer ${GH_TOKEN}"
          git fetch origin main
          git checkout -B main "$MERGE_COMMIT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          test -s "$RUNNER_TEMP/main-release-notes.md"

          # 在 main 最新 commit 上创建 tag（即 squash merge 后的 release commit）
          if git ls-remote --exit-code --tags origin "v${VERSION}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/v${VERSION}:refs/tags/v${VERSION}"
            TAG_TARGET=$(git rev-list -n 1 "v${VERSION}")
            MAIN_TARGET=$(git rev-parse HEAD)

            if [ "$TAG_TARGET" != "$MAIN_TARGET" ]; then
              echo "Existing tag v${VERSION} points to ${TAG_TARGET}, expected ${MAIN_TARGET}"
              exit 1
            fi

            echo "Existing tag v${VERSION} points to ${TAG_TARGET}"
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi

          # 创建 GitHub Release，上传 native binaries 作为 assets
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub Release v${VERSION} already exists"
            gh release upload "v${VERSION}" native/*.node --clobber
            exit 0
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$RUNNER_TEMP/main-release-notes.md" \
            native/*.node
          echo "Created release with native binaries as assets"

      # 发布总结
      - name: Release summary
        run: |
          VERSION=${{ steps.release_version.outputs.version }}
          NATIVE_CHANGED=${{ needs.analyze.outputs.native_changed }}
          HAS_ASSETS=${{ needs.analyze.outputs.has_native_assets }}

          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本: ${VERSION}" >> $GITHUB_STEP_SUMMARY

          if [ "$NATIVE_CHANGED" == "true" ]; then
            echo "🔨 Native Signer: 重新构建 (native 代码有变更)" >> $GITHUB_STEP_SUMMARY
          elif [ "$HAS_ASSETS" == "false" ]; then
            echo "🔨 Native Signer: 重新构建 (上次 Release 无 assets)" >> $GITHUB_STEP_SUMMARY
          else
            echo "♻️ Native Signer: 复用上次构建" >> $GITHUB_STEP_SUMMARY
          fi

          echo "✅ 已发布到 npm" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release PR 已自动合并" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release 已创建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Native 平台支持" >> $GITHUB_STEP_SUMMARY
          echo "- darwin-x64 (macOS Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- darwin-arm64 (macOS Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- linux-x64-gnu (Linux glibc)" >> $GITHUB_STEP_SUMMARY
          echo "- linux-x64-musl (Alpine Linux)" >> $GITHUB_STEP_SUMMARY
          echo "- linux-arm64-musl (Alpine Linux ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- win32-x64 (Windows)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "查看详情：" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/@taptap/instant-games-open-mcp/v/${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY

  # ========== 无需发布 ==========
  no-release:
    name: No Release Needed
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.should_release == 'false'

    steps:
      - name: Summary
        run: |
          echo "## ℹ️ No Release Needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "根据提交历史分析，当前不需要发布新版本。" >> $GITHUB_STEP_SUMMARY

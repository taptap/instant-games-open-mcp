name: Auto Release (via PR)

# 通过自动 PR 实现完全自动化的发布流程
# 包含 native signer 的多平台构建

on:
  push:
    branches:
      - main
      - beta
      - alpha

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  # ========== 阶段 1: 分析是否需要发布 ==========
  analyze:
    name: Analyze Release
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    outputs:
      should_release: ${{ steps.analyze.outputs.should_release }}
      version: ${{ steps.analyze.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Analyze commits for release
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx semantic-release --dry-run --no-ci 2>&1 | tee release-output.txt

          NEW_VERSION=$(grep "The next release version is" release-output.txt | sed 's/.*is //' || echo "")

          if [ -z "$NEW_VERSION" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Will release version: $NEW_VERSION"
          fi

  # ========== 阶段 2: 构建 Native Signer (多平台并行) ==========
  build-native:
    name: Build Native - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs: analyze
    if: needs.analyze.outputs.should_release == 'true'

    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              cd native
              npm run build
              strip -x *.node

          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              cd native
              npm run build -- --target aarch64-apple-darwin
              strip -x *.node

          # Linux GNU
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              cd native
              npm run build -- --target x86_64-unknown-linux-gnu
              strip *.node

          # Linux Musl (Alpine)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              cd native
              npm run build -- --target x86_64-unknown-linux-musl
              strip *.node

          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              cd native
              npm run build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-${{ matrix.settings.target }}-${{ hashFiles('native/Cargo.lock') }}

      - name: Install native dependencies
        run: |
          cd native
          npm install

      - name: Build in Docker
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: |
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build
            -e BUILD_CLIENT_ID=${{ secrets.BUILD_CLIENT_ID }}
            -e BUILD_CLIENT_SECRET=${{ secrets.BUILD_CLIENT_SECRET }}
          run: ${{ matrix.settings.build }}

      - name: Build
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          BUILD_CLIENT_ID: ${{ secrets.BUILD_CLIENT_ID }}
          BUILD_CLIENT_SECRET: ${{ secrets.BUILD_CLIENT_SECRET }}
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: native/*.node
          if-no-files-found: error

  # ========== 阶段 3: 发布 ==========
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [analyze, build-native]
    if: needs.analyze.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # 下载所有 native 构建产物
      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move native binaries to native/
        run: |
          mkdir -p native

          # 移动所有 .node 文件
          find artifacts -name "*.node" -exec cp {} native/ \;

          echo "=== Native binaries ==="
          ls -la native/*.node

      # 质量检查
      - name: Lint code
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

      # 创建 Release 分支
      - name: Create release branch
        id: branch
        run: |
          VERSION=${{ needs.analyze.outputs.version }}
          BRANCH="release/v${VERSION}"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

      # 发布到 npm (包含 native binaries)
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ needs.analyze.outputs.version }}

          # 更新版本号
          npm version $VERSION --no-git-tag-version

          # 验证 native 文件会被包含
          echo "=== Files to be published ==="
          npm pack --dry-run

          # 发布
          npm publish --access public

      # 生成 CHANGELOG
      - name: Generate CHANGELOG
        run: |
          npx conventional-changelog-cli -p conventionalcommits -i CHANGELOG.md -s

      # 提交并推送
      - name: Commit and push release branch
        run: |
          VERSION=${{ needs.analyze.outputs.version }}
          BRANCH=${{ steps.branch.outputs.branch }}

          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${VERSION} [skip ci]

          - Includes native signer binaries for all platforms

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "$BRANCH"

      # 创建 PR
      - name: Create Pull Request
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.analyze.outputs.version }}
          BRANCH=${{ steps.branch.outputs.branch }}

          PR_URL=$(gh pr create \
            --title "chore(release): ${VERSION} [skip ci]" \
            --body "## 📦 Release ${VERSION}

          此 PR 由自动发布流程创建。

          ### 变更内容
          - ✅ 版本号: ${VERSION}
          - ✅ 已发布到 npm (包含 native signer)
          - 📝 更新 \`package.json\`
          - 📝 更新 \`CHANGELOG.md\`

          ### Native Signer 平台支持
          - ✅ macOS (Intel + Apple Silicon)
          - ✅ Linux (x64 glibc + musl)
          - ✅ Windows (x64)

          ### 自动化流程
          此 PR 将在创建后立即自动合并。

          🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Created PR: $PR_URL"

      # 自动合并
      - name: Auto-merge PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=${{ steps.pr.outputs.pr_url }}
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          echo "Merging PR #$PR_NUMBER..."
          sleep 10

          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch

          echo "PR #$PR_NUMBER merged successfully!"

      # 创建 GitHub Release
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.analyze.outputs.version }}

          sleep 10

          git fetch origin
          git checkout -B main origin/main

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          RELEASE_NOTES=$(npx conventional-changelog-cli -p conventionalcommits -o /dev/stdout -r 1)

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$RELEASE_NOTES"

      # 发布总结
      - name: Release summary
        run: |
          VERSION=${{ needs.analyze.outputs.version }}

          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 版本: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Native Signer 已编译 (5 平台)" >> $GITHUB_STEP_SUMMARY
          echo "✅ 已发布到 npm" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release PR 已自动合并" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release 已创建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Native 平台支持" >> $GITHUB_STEP_SUMMARY
          echo "- darwin-x64 (macOS Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- darwin-arm64 (macOS Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- linux-x64-gnu (Linux glibc)" >> $GITHUB_STEP_SUMMARY
          echo "- linux-x64-musl (Alpine Linux)" >> $GITHUB_STEP_SUMMARY
          echo "- win32-x64 (Windows)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "查看详情：" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/@mikoto_zero/minigame-open-mcp/v/${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY

  # ========== 无需发布 ==========
  no-release:
    name: No Release Needed
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.should_release == 'false'

    steps:
      - name: Summary
        run: |
          echo "## ℹ️ No Release Needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "根据提交历史分析，当前不需要发布新版本。" >> $GITHUB_STEP_SUMMARY
